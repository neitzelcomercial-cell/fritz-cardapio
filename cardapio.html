<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRITZ - Cardápio Digital</title>
<style>
/* ============================================================
   FONTS
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700;800&display=swap');

/* ============================================================
   RESET & ROOT
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root {
  --pink:#e94560;
  --pink-dark:#c23152;
  --gold:#f5a623;
  --gold-light:#ffd700;
  --bg:#0d0d1a;
  --bg2:#141428;
  --card:rgba(22,33,62,0.85);
  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.10);
  --text:#ffffff;
  --text-muted:#9a9ab8;
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --radius:16px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

body {
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  width:100%;
}

/* ============================================================
   SPLASH SCREEN
   ============================================================ */
.splash {
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 40%, #1a0a2e 0%, #0d0d1a 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.8s ease, transform 0.8s ease;
}
.splash.hidden {opacity:0;transform:scale(1.15);pointer-events:none}

.splash-logo {
  width:140px;height:140px;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  border-radius:32px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 60px rgba(233,69,96,0.3), 0 0 120px rgba(246,166,35,0.15);
  animation:splashPulse 2s ease-in-out infinite;
  position:relative;
}
.splash-logo::after {
  content:'';position:absolute;inset:-4px;
  border-radius:36px;
  background:linear-gradient(135deg,var(--pink),var(--gold),var(--pink));
  z-index:-1;opacity:0.5;animation:splashGlow 2s linear infinite;
}
@keyframes splashGlow {0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes splashPulse {0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.splash-logo span {
  font-family:'Playfair Display',serif;
  font-size:4rem;font-weight:900;
  background:linear-gradient(135deg,#fff 30%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
.splash-title {
  margin-top:28px;
  font-family:'Playfair Display',serif;
  font-size:2rem;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.splash-sub {
  margin-top:8px;font-size:0.9rem;color:var(--text-muted);letter-spacing:2px;
}
.splash-loader {
  margin-top:40px;width:160px;height:3px;border-radius:3px;
  background:var(--glass);overflow:hidden;
}
.splash-loader-bar {
  height:100%;width:0%;border-radius:3px;
  background:linear-gradient(90deg,var(--pink),var(--gold));
  animation:splashLoad 1.8s ease-in-out forwards;
}
@keyframes splashLoad {0%{width:0%}100%{width:100%}}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  background:linear-gradient(135deg, #1a0a2e 0%, var(--pink-dark) 40%, #0f3460 100%);
  padding:48px 20px 28px;
  text-align:center;position:relative;overflow:hidden;
}
.header::before {
  content:'';position:absolute;top:-60%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 60%);
  animation:headerPulse 5s ease-in-out infinite;
}
@keyframes headerPulse {0%,100%{transform:translate(0,0)}50%{transform:translate(-10%,10%)}}

.header-logo {
  width:72px;height:72px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(233,69,96,0.35);
  position:relative;
}
.header-logo span {
  font-family:'Playfair Display',serif;
  font-size:2rem;font-weight:900;
  color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.header h1 {
  font-family:'Playfair Display',serif;
  font-size:1.8rem;font-weight:700;letter-spacing:3px;
  position:relative;text-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.header h1 span {color:var(--gold)}
.header p {
  position:relative;margin-top:6px;font-size:0.95rem;opacity:0.85;letter-spacing:1px;
}

/* ============================================================
   SEARCH BAR
   ============================================================ */
.search-wrap {
  padding:12px 16px;background:var(--bg);
  position:sticky;top:0;z-index:50;
}
.search-box {
  display:flex;align-items:center;gap:10px;
  background:var(--card);backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:14px;padding:10px 16px;
}
.search-box:focus-within {border-color:var(--pink);box-shadow:0 0 20px rgba(233,69,96,0.15)}
.search-box input {
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:0.95rem;font-family:'Inter',sans-serif;
}
.search-box input::placeholder {color:var(--text-muted)}
.search-box .search-icon {font-size:1.2rem;opacity:0.5}

/* ============================================================
   NAV CATEGORIES
   ============================================================ */
.nav-wrapper {
  background:var(--bg);
  border-bottom:1px solid rgba(255,255,255,0.04);
  padding:0 16px 12px;
}
.nav-categories {
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
  padding-bottom:4px;
}
.nav-categories::-webkit-scrollbar {display:none}
.nav-btn {
  flex:0 0 auto;padding:8px 16px;border-radius:20px;
  border:1px solid var(--glass-border);background:var(--glass);
  color:var(--text-muted);font-size:0.78rem;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:all 0.3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(8px);font-family:'Inter',sans-serif;
}
.nav-btn:hover,.nav-btn.active {
  background:linear-gradient(135deg,var(--pink),var(--pink-dark));
  color:#fff;border-color:transparent;
  transform:translateY(-1px);box-shadow:0 4px 16px rgba(233,69,96,0.25);
}
.nav-btn .nav-icon {margin-right:4px}

/* ============================================================
   CONTAINER / CATEGORIAS
   ============================================================ */
.container {
  max-width:900px;margin:0 auto;padding:16px 16px 120px;
}
.categoria {display:none;animation:fadeUp 0.45s cubic-bezier(.4,0,.2,1)}
.categoria.active {display:block}
@keyframes fadeUp {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.cat-header {
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
  padding-bottom:12px;border-bottom:2px solid var(--pink);
}
.cat-header .icon {font-size:1.6rem}
.cat-header h2 {
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:700;color:var(--gold);
}
.cat-header .count {
  margin-left:auto;font-size:0.78rem;color:var(--text-muted);
  background:var(--glass);padding:4px 12px;border-radius:20px;
  border:1px solid var(--glass-border);
}

/* ============================================================
   ITEM CARD
   ============================================================ */
.item {
  background:var(--card);backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:14px 16px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all 0.3s cubic-bezier(.4,0,.2,1);
}
.item:active {transform:scale(0.98)}
.item:hover {border-color:rgba(233,69,96,0.4);box-shadow:0 4px 24px rgba(233,69,96,0.08)}
.item::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--pink),transparent);
  opacity:0;transition:opacity 0.3s;
}
.item:hover::before {opacity:1}

/* Logo FR em cada item */
.item-logo {
  width:44px;height:44px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(233,69,96,0.25);
  transition:transform 0.3s;
}
.item:hover .item-logo {transform:rotate(-5deg) scale(1.05)}
.item-logo span {
  font-family:'Playfair Display',serif;
  font-size:1rem;font-weight:900;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.3);
}

.item-info {flex:1;min-width:0}
.item-nome {
  font-size:0.95rem;font-weight:700;
  display:flex;align-items:center;gap:6px;
}
.item-nome .badge {
  font-size:0.55rem;padding:2px 8px;border-radius:10px;
  background:var(--pink);color:#fff;font-weight:600;
  letter-spacing:0.5px;
}
.item-desc {
  font-size:0.8rem;color:var(--text-muted);line-height:1.4;margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.item-bottom {
  display:flex;align-items:center;gap:10px;margin-top:6px;
}
.item-preco {
  font-size:1.05rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.item-btn-add {
  padding:4px 14px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--pink-dark));
  color:#fff;font-size:0.75rem;font-weight:700;
  cursor:pointer;transition:all 0.3s;
  font-family:'Inter',sans-serif;
}
.item-btn-add:active {transform:scale(0.92)}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align:center;padding:48px 20px;color:var(--text-muted);
}
.empty-state .empty-icon {font-size:3rem;margin-bottom:12px;opacity:0.5}
.empty-state p {font-size:0.95rem}

/* ============================================================
   MODAL — DETALHE DO PRODUTO
   ============================================================ */
.modal-overlay {
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open {display:flex}
@keyframes modalUp {from{transform:translateY(100%)}to{transform:translateY(0)}}

.modal {
  width:100%;max-width:480px;
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
  border-radius:24px 24px 0 0;
  padding:24px 20px calc(24px + var(--safe-bottom));
  animation:modalUp 0.4s cubic-bezier(.22,1,.36,1);
  position:relative;max-height:92vh;overflow-y:auto;
}
.modal-handle {
  width:40px;height:4px;border-radius:4px;
  background:var(--glass-border);margin:0 auto 16px;
}
.modal-logo {
  width:64px;height:64px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(233,69,96,0.3);
}
.modal-logo span {
  font-family:'Playfair Display',serif;
  font-size:1.6rem;font-weight:900;color:#fff;
}
.modal h3 {
  font-family:'Playfair Display',serif;
  font-size:1.6rem;font-weight:700;text-align:center;
}
.modal .modal-cat {
  text-align:center;font-size:0.8rem;color:var(--text-muted);margin-top:2px;letter-spacing:1px;
}
.modal .modal-desc {
  text-align:center;color:var(--text-muted);font-size:0.9rem;
  margin:12px 0 20px;line-height:1.5;
}
.modal .modal-preco {
  text-align:center;font-size:1.8rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:20px;
}

/* Qty selector */
.qty-wrap {
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-bottom:20px;
}
.qty-btn {
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--glass-border);background:var(--glass);
  color:#fff;font-size:1.3rem;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;font-family:'Inter',sans-serif;
}
.qty-btn:active {transform:scale(0.9)}
.qty-btn.minus:active {background:var(--pink);border-color:var(--pink)}
.qty-btn.plus:active {background:var(--gold);border-color:var(--gold)}
.qty-num {
  font-size:1.5rem;font-weight:700;min-width:40px;text-align:center;
}

/* Subtotal no modal */
.modal-subtotal {
  text-align:center;font-size:0.9rem;color:var(--text-muted);margin-bottom:16px;
}
.modal-subtotal strong {color:var(--gold);font-size:1.1rem}

.modal-actions {
  display:flex;gap:10px;
}
.modal-actions button {
  flex:1;padding:14px;border-radius:14px;border:none;
  font-weight:700;font-size:0.95rem;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.2s;
}
.modal-actions button:active {transform:scale(0.97)}
.btn-cart {
  background:linear-gradient(135deg,var(--pink),var(--pink-dark));
  color:#fff;box-shadow:0 4px 16px rgba(233,69,96,0.3);
}
.btn-reserve {
  background:linear-gradient(135deg,var(--gold),#d4891a);
  color:#fff;box-shadow:0 4px 16px rgba(246,166,35,0.3);
}
.btn-close-modal {
  background:var(--glass);color:var(--text-muted);border:1px solid var(--glass-border);
}

/* ============================================================
   CART BUTTON (FLOAT)
   ============================================================ */
.cart-float {
  position:fixed;bottom:calc(24px + var(--safe-bottom));right:20px;z-index:200;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink-dark));
  border:none;color:#fff;font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(233,69,96,0.4);
  cursor:pointer;transition:all 0.3s cubic-bezier(.4,0,.2,1);
}
.cart-float:active {transform:scale(0.9)}
.cart-badge {
  position:absolute;top:-4px;right:-4px;
  min-width:22px;height:22px;border-radius:11px;
  background:var(--gold);color:#000;font-size:0.7rem;font-weight:800;
  display:none;align-items:center;justify-content:center;
  padding:0 5px;border:2px solid var(--bg);
}

/* ============================================================
   WHATSAPP FLOAT
   ============================================================ */
.whatsapp-float {
  position:fixed;bottom:calc(96px + var(--safe-bottom));right:20px;z-index:200;
  width:60px;height:60px;border-radius:50%;
  background:#25D366;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,0.4);
  cursor:pointer;transition:all 0.3s;border:none;color:#fff;
  font-size:1.5rem;text-decoration:none;
}
.whatsapp-float:active {transform:scale(0.9)}
.whatsapp-float.visible {display:flex !important}

/* ============================================================
   CART PAGE (full screen)
   ============================================================ */
.cart-page {
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:none;flex-direction:column;
  animation:fadeUp 0.35s cubic-bezier(.4,0,.2,1);
}
.cart-page.open {display:flex}

.cart-header {
  display:flex;align-items:center;gap:12px;
  padding:48px 16px 12px;
  background:linear-gradient(135deg,#1a0a2e 0%,var(--pink-dark) 100%);
}
.cart-header .back-btn {
  background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;
}
.cart-header .back-btn:active {background:rgba(255,255,255,0.1)}
.cart-header h2 {
  font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;flex:1;
}
.cart-header .clear-btn {
  background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);
  padding:8px 14px;border-radius:10px;font-size:0.8rem;cursor:pointer;font-family:'Inter',sans-serif;
}

.cart-items {
  flex:1;overflow-y:auto;padding:16px;
}
.cart-empty {
  text-align:center;padding:60px 20px;color:var(--text-muted);
}
.cart-empty .empty-icon {font-size:3.5rem;margin-bottom:12px;opacity:0.4}
.cart-empty p {font-size:0.9rem}

.cart-item {
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:14px;padding:12px 14px;
  margin-bottom:10px;border:1px solid var(--glass-border);
}
.cart-item-logo {
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.cart-item-logo span {
  font-family:'Playfair Display',serif;font-size:0.8rem;font-weight:900;color:#fff;
}
.cart-item-info {flex:1}
.cart-item-info .cinome {font-weight:600;font-size:0.9rem}
.cart-item-info .cipreco {font-size:0.82rem;color:var(--text-muted)}
.cart-item-qty {
  display:flex;align-items:center;gap:8px;
}
.cart-item-qty button {
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--glass-border);background:var(--glass);
  color:#fff;font-size:0.8rem;cursor:pointer;font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;
}
.cart-item-qty button:active {transform:scale(0.88)}
.cart-item-qty span {font-weight:700;min-width:20px;text-align:center;font-size:0.9rem}
.cart-item-remove {
  background:none;border:none;color:var(--text-muted);font-size:1.1rem;
  cursor:pointer;padding:4px;
}

/* Footer do carrinho com calculadora */
.cart-footer {
  background:var(--card);backdrop-filter:blur(12px);
  border-top:1px solid var(--glass-border);
  padding:16px 16px calc(16px + var(--safe-bottom));
}
.cart-footer .calc-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0;font-size:0.88rem;color:var(--text-muted);
}
.cart-footer .calc-row.total {
  font-size:1.15rem;font-weight:700;color:var(--gold);
  border-top:1px solid var(--glass-border);padding-top:10px;margin-top:4px;
}
.cart-footer .calc-row.taxa {font-size:0.78rem}
.cart-footer .calc-row .value {color:var(--text)}
.cart-footer .calc-row.total .value {
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-size:1.25rem;
}
.cart-checkout {
  width:100%;margin-top:10px;padding:16px;
  border-radius:14px;border:none;
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;font-size:1rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  font-family:'Inter',sans-serif;box-shadow:0 4px 16px rgba(37,211,102,0.3);
}
.cart-checkout:active {transform:scale(0.98)}

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  z-index:600;
  padding:12px 24px;border-radius:12px;
  background:var(--card);backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  color:#fff;font-size:0.85rem;font-weight:600;
  box-shadow:var(--shadow);
  opacity:0;transition:all 0.4s cubic-bezier(.4,0,.2,1);
  pointer-events:none;white-space:nowrap;
}
.toast.show {opacity:1;transform:translateX(-50%) translateY(0)}
.toast .toast-icon {margin-right:6px}

/* ============================================================
   ANIMAÇÃO ADICIONAL
   ============================================================ */
.shimmer {
  background:linear-gradient(90deg,var(--glass) 25%,rgba(255,255,255,0.04) 50%,var(--glass) 75%);
  background-size:200% 100%;animation:shimmer 2s infinite;
}
@keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (min-width:768px) {
  .header{padding:60px 20px 36px}
  .header-logo{width:88px;height:88px}
  .header-logo span{font-size:2.4rem}
  .header h1{font-size:2.4rem}
  .container{padding:20px 20px 100px}
  .item{padding:16px 20px}
  .item-logo{width:50px;height:50px}
  .item-logo span{font-size:1.1rem}
  .item-nome{font-size:1rem}
  .modal{max-width:420px;border-radius:28px;margin:auto 16px;animation:none;max-height:90vh}
  .modal-overlay.open{align-items:center}
}
</style>
</head>
<body>

<!-- ============================================================
SPLASH SCREEN
============================================================ -->
<div class="splash" id="splash">

// ============================================================
// CARRINHO (localStorage)
// ============================================================
let cart = JSON.parse(localStorage.getItem('fritz_cart') || '[]');

function saveCart() {
  localStorage.setItem('fritz_cart', JSON.stringify(cart));
  updateCartBadge();
}

function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  const total = cart.reduce((s,i) => s + i.qty, 0);
  if (total > 0) {
    badge.style.display = 'flex';
    badge.textContent = total;
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================
// UTILITÁRIOS
// ============================================================
const keys = Object.keys(cardapio);
let activeKey = keys[0];
let searchQuery = '';

function fmt(v){return 'R$ '+v.toFixed(2).replace('.',',')}

// ============================================================
// RENDER
// ============================================================
function render() {
  // Nav
  const navEl = document.getElementById('navCategorias');
  navEl.innerHTML = keys.map(k => {
    const c = cardapio[k];
    return `<button class="nav-btn${k===activeKey?' active':''}" data-key="${k}">
      ${c.icon||''} ${c.nome}
    </button>`;
  }).join('');

  // Conteúdo
  const container = document.getElementById('container');
  const q = searchQuery.toLowerCase().trim();

  container.innerHTML = keys.map(k => {
    const c = cardapio[k];
    const filtered = q ? c.itens.filter(i =>
      i.nome.toLowerCase().includes(q) || (i.desc||'').toLowerCase().includes(q)
    ) : c.itens;

    if (q && k !== activeKey) {
      // show category only if it has matches
      if (!filtered.length) return '';
      // if matches exist, show it regardless of activeKey
    }

    const isActive = (k === activeKey) || (q && filtered.length > 0);
    if (q && k !== activeKey && !filtered.length) return '';

    return `
      <div class="categoria${isActive?' active':''}" id="cat-${k}">
        <div class="cat-header">
          <span class="icon">${c.icon||''}</span>
          <h2>${c.nome}</h2>
          <span class="count">${filtered.length} itens</span>
        </div>
        ${filtered.length ? filtered.map(item => `
          <div class="item" data-key="${k}" data-item="${item.nome}">
            <div class="item-logo"><span>FR</span></div>
            <div class="item-info">
              <div class="item-nome">${item.nome}</div>
              ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
              <div class="item-bottom">
                <span class="item-preco">${fmt(item.preco)}</span>
                <button class="item-btn-add" data-add="${k}|${item.nome}">+ Add</button>
              </div>
            </div>
          </div>
        `).join('') : `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <p>Nenhum item encontrado para "<strong>${q}</strong>"</p>
          </div>
        `}
      </div>`;
  }).join('');

  // Se pesquisa ativa, mostrar todas categorias com match
  if (q) {
    document.querySelectorAll('.categoria').forEach(el => {
      const hasItems = el.querySelector('.item') !== null;
      el.style.display = hasItems ? 'block' : 'none';
    });
  }
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
document.addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  const key = btn.dataset.key;
  if (!key || key === activeKey) return;
  activeKey = key;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  render();
});

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ============================================================
// MODAL
// ============================================================
let modalItem = null;
let modalKey = null;
let modalQty = 1;

function openModal(key, item) {
  modalKey = key;
  modalItem = item;
  modalQty = 1;
  document.getElementById('modalNome').textContent = item.nome;
  document.getElementById('modalCategoria').textContent = cardapio[key].nome;
  document.getElementById('modalDesc').textContent = item.desc || '';
  document.getElementById('modalPreco').textContent = fmt(item.preco);
  document.getElementById('qtyNum').textContent = '1';
  updateModalSubtotal();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function updateModalSubtotal() {
  if (!modalItem) return;
  const sub = modalItem.preco * modalQty;
  document.getElementById('modalSubtotal').innerHTML = `Subtotal: <strong>${fmt(sub)}</strong>`;
}

document.getElementById('qtyMinus').addEventListener('click', () => {
  if (modalQty > 1) { modalQty--; document.getElementById('qtyNum').textContent = modalQty; updateModalSubtotal(); }
});
document.getElementById('qtyPlus').addEventListener('click', () => {
  modalQty++; document.getElementById('qtyNum').textContent = modalQty; updateModalSubtotal();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Add to cart from modal
document.getElementById('modalAddCart').addEventListener('click', () => {
  if (!modalItem) return;
  addToCart(modalKey, modalItem, modalQty);
  closeModal();
});

// Reserve from modal
document.getElementById('modalReserve').addEventListener('click', () => {
  if (!modalItem) return;
  addToCart(modalKey, modalItem, modalQty, true);
  closeModal();
  showToast('📅 Item reservado!');
});

// Helper: add to cart
function addToCart(key, item, qty = 1, isReserve = false) {
  const existing = cart.find(i => i.key === key && i.nome === item.nome && i.isReserve === !!isReserve);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({
      key,
      nome: item.nome,
      desc: item.desc || '',
      preco: item.preco,
      qty,
      isReserve: !!isReserve
    });
  }
  saveCart();
  showToast(isReserve ? `📅 ${item.nome} reservado!` : `🛒 ${item.nome} adicionado!`);
}

// Click on item to open modal
document.addEventListener('click', e => {
  const addBtn = e.target.closest('[data-add]');
  if (addBtn) {
    e.stopPropagation();
    const [k, n] = addBtn.dataset.add.split('|');
    const item = cardapio[k].itens.find(i => i.nome === n);
    if (item) { openModal(k, item); return; }
  }

  const itemEl = e.target.closest('.item');
  if (itemEl && !e.target.closest('[data-add]')) {
    const k = itemEl.dataset.key;
    const n = itemEl.dataset.item;
    const item = cardapio[k]?.itens.find(i => i.nome === n);
    if (item) openModal(k, item);
  }
});

// ============================================================
// CARRINHO
// ============================================================
function openCart() {
  renderCart();
  document.getElementById('cartPage').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cartPage').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('cartFloat').addEventListener('click', openCart);
document.getElementById('cartBack').addEventListener('click', closeCart);

function renderCart() {
  const el = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  if (!cart.length) {
    el.innerHTML = `
      <div class="cart-empty">
        <div class="empty-icon">🛒</div>
        <p>Seu carrinho está vazio</p>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Toque em um item para adicionar</p>
      </div>`;
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';

  el.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="cart-item-logo"><span>FR</span></div>
      <div class="cart-item-info">
        <div class="cinome">${item.nome} ${item.isReserve ? '<span style="color:var(--gold);font-size:0.7rem">📅 Reserva</span>' : ''}</div>
        <div class="cipreco">${fmt(item.preco)} un. · ${cardapio[item.key]?.nome||''}</div>
      </div>
      <div class="cart-item-qty">
        <button data-dec="${idx}">−</button>
        <span>${item.qty}</span>
        <button data-inc="${idx}">+</button>
      </div>
      <button class="cart-item-remove" data-rm="${idx}">✕</button>
    </div>
  `).join('');

  // Calcular
  const sub = cart.reduce((s,i) => s + i.preco * i.qty, 0);
  const taxa = sub * 0.1;
  const total = sub + taxa;
  document.getElementById('calcSubtotal').textContent = fmt(sub);
  document.getElementById('calcTaxa').textContent = fmt(taxa);
  document.getElementById('calcTotal').textContent = fmt(total);
}

// Cart item events
document.addEventListener('click', e => {
  const dec = e.target.closest('[data-dec]');
  const inc = e.target.closest('[data-inc]');
  const rm = e.target.closest('[data-rm]');

  if (dec) {
    const idx = +dec.dataset.dec;
    if (cart[idx]) {
      if (cart[idx].qty > 1) cart[idx].qty--;
      else cart.splice(idx,1);
      saveCart(); renderCart();
    }
  }
  if (inc) {
    const idx = +inc.dataset.inc;
    if (cart[idx]) { cart[idx].qty++; saveCart(); renderCart(); }
  }
  if (rm) {
    const idx = +rm.dataset.rm;
    if (cart[idx]) { cart.splice(idx,1); saveCart(); renderCart(); }
  }
});

document.getElementById('cartClear').addEventListener('click', () => {
  if (cart.length === 0) return;
  if (confirm('Limpar todo o carrinho?')) {
    cart = [];
    saveCart();
    renderCart();
    showToast('🔄 Carrinho limpo');
  }
});

// ============================================================
// CHECKOUT VIA WHATSAPP
// ============================================================
document.getElementById('cartCheckout').addEventListener('click', () => {
  if (!cart.length) { showToast('🛒 Carrinho vazio!'); return; }

  const sub = cart.reduce((s,i) => s + i.preco * i.qty, 0);
  const taxa = sub * 0.1;
  const total = sub + taxa;

  let msg = '🍔 *PEDIDO FRITZ*\n';
  msg += '━━━━━━━━━━━━━━━━━━━\n\n';
  cart.forEach((item,i) => {
    const subItem = item.preco * item.qty;
    msg += `${i+1}. ${item.nome}`;
    if (item.isReserve) msg += ' 📅';
    msg += `\n   ${item.qty}x ${fmt(item.preco)} = ${fmt(subItem)}\n\n`;
  });
  msg += '━━━━━━━━━━━━━━━━━━━\n';
  msg += `Subtotal: ${fmt(sub)}\n`;
  msg += `Taxa 10%: ${fmt(taxa)}\n`;
  msg += `*Total: ${fmt(total)}*\n\n`;
  msg += '📍 *Retirada no local*\n';
  msg += '⏱️ Informe o horário';

  const url = 'https://wa.me/5511999999999?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
});

// ============================================================
// TOAST
// ============================================================
let toastTimer;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// SPLASH
// ============================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
  }, 1800);
});

// ============================================================
// INIT
// ============================================================
render();
updateCartBadge();
</script>
</body>
</html>
