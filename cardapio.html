    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #e94560;
            --accent2: #f5a623;
            --text: #ffffff;
            --text-muted: #a0a0b8;
            --border: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #e94560 0%, #c23152 50%, #0f3460 100%);
            padding: 40px 20px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            position: relative;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        .header h1 span { color: #f5a623; }
        .header p {
            position: relative;
            margin-top: 8px;
            font-size: 1.1rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* NAVEGAÇÃO CATEGORIAS */
        .nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .nav-categories {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--border);
            -webkit-overflow-scrolling: touch;
        }
        .nav-categories::-webkit-scrollbar { height: 4px; }
        .nav-categories::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .nav-categories::-webkit-scrollbar-track { background: var(--border); }

        .nav-btn {
            flex: 0 0 auto;
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* CONTEÚDO */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .categoria {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .categoria.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
        }
        .cat-header .icon {
            font-size: 1.8rem;
        }
        .cat-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent2);
        }
        .cat-header .count {
            margin-left: auto;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--card);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .item {
            background: var(--card);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(233,69,96,0.1);
        }

        .item-info { flex: 1; }
        .item-nome {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .item-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }
        .item-preco {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent2);
            white-space: nowrap;
            padding-top: 2px;
        }

        /* BOTÃO WHATSAPP */
        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37,211,102,0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 200;
            border: none;
            color: white;
            font-size: 28px;
            text-decoration: none;
        }
        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(37,211,102,0.6);
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .header p { font-size: 0.95rem; }
            .nav-categories { padding: 10px 12px; }
            .nav-btn { padding: 6px 14px; font-size: 0.8rem; }
            .item { padding: 14px; }
            .item-nome { font-size: 0.95rem; }
            .item-preco { font-size: 1rem; }
            .whatsapp-float { width: 52px; height: 52px; font-size: 24px; bottom: 18px; right: 18px; }
        }
    </style>
</head>

const container = document.getElementById('container');

let activeKey = keys[0];

function formatarPreco(valor) {
    return `R$ ${valor.toFixed(2).replace('.', ',')}`;
}

    // Nav
    navEl.innerHTML = keys.map(key => {
        const cat = cardapio[key];
        const label = cat.icon ? `${cat.icon} ${cat.nome}` : cat.nome;
        return `<button class="nav-btn${key === activeKey ? ' active' : ''}" data-key="${key}">${label}</button>`;
    }).join('');

                    <h2>${cat.nome}</h2>
                    <span class="count">${cat.itens.length} itens</span>
                </div>
                ${cat.itens.map(item => `
                    <div class="item">
                        <div class="item-info">
                            <div class="item-nome">${item.nome}</div>
                            ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
                        </div>
                        <div class="item-preco">${formatarPreco(item.preco)}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }).join('');
}

// Eventos de navegação
document.addEventListener('click', (e) => {
    const btn = e.target.closest('.nav-btn');
    if (!btn) return;
    const key = btn.dataset.key;
    if (!key || key === activeKey) return;

    activeKey = key;

    // Atualizar nav
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Atualizar categorias
    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
    const target = document.getElementById(`cat-${key}`);
    if (target) target.classList.add('active');

    // Scroll suave pro topo do container
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

renderizar();
</script>

</body>
</html>
